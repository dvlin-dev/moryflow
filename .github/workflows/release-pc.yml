name: Release PC

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to re-run (for example v0.3.0)
        required: true
        type: string

concurrency:
  group: release-pc-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: 20
  PNPM_VERSION: 9.12.2

jobs:
  metadata:
    name: Resolve Release Metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      tag_sha: ${{ steps.meta.outputs.tag_sha }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
            if [[ -z "${TAG}" ]]; then
              echo "workflow_dispatch requires inputs.tag" >&2
              exit 1
            fi

            if ! git rev-parse --verify --quiet "refs/tags/${TAG}" >/dev/null; then
              echo "Requested tag ${TAG} does not exist." >&2
              exit 1
            fi

            VERSION="$(
              git show "${TAG}:apps/moryflow/pc/package.json" \
                | node -e "let raw='';process.stdin.setEncoding('utf8');process.stdin.on('data',(chunk)=>raw+=chunk);process.stdin.on('end',()=>process.stdout.write(JSON.parse(raw).version));"
            )"
          else
            VERSION="$(node -p "JSON.parse(require('node:fs').readFileSync('apps/moryflow/pc/package.json', 'utf8')).version")"
            TAG="v${VERSION}"
          fi

          if ! [[ "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Unsupported release version: ${VERSION}. Only x.y.z format is allowed." >&2
            exit 1
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF_NAME}" != "${TAG}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match apps/moryflow/pc/package.json version ${VERSION}." >&2
            exit 1
          fi

          TAG_SHA="$(git rev-list -n 1 "${TAG}")"
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${TAG_SHA}" != "${GITHUB_SHA}" ]]; then
            echo "Tag ${TAG} already points to ${TAG_SHA}, but workflow is running for ${GITHUB_SHA}." >&2
            exit 1
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "tag_sha=${TAG_SHA}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  build-macos-arm64:
    name: Build macOS arm64
    needs: metadata
    runs-on: macos-14
    env:
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.metadata.outputs.tag }}
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Prepare Apple notarization key
        shell: bash
        run: |
          KEY_PATH="${RUNNER_TEMP}/AuthKey_${APPLE_API_KEY_ID}.p8"
          if [[ "${APPLE_API_KEY_CONTENT}" == *"BEGIN PRIVATE KEY"* ]]; then
            printf '%s\n' "${APPLE_API_KEY_CONTENT}" > "${KEY_PATH}"
          else
            APPLE_API_KEY_CONTENT="${APPLE_API_KEY_CONTENT}" python3 -c 'import base64, os, sys; sys.stdout.buffer.write(base64.b64decode(os.environ["APPLE_API_KEY_CONTENT"]))' > "${KEY_PATH}"
          fi
          chmod 600 "${KEY_PATH}"
          echo "APPLE_API_KEY=${KEY_PATH}" >> "${GITHUB_ENV}"
      - run: pnpm install --frozen-lockfile --prefer-offline --config.node-linker=isolated
      - name: Build renderer/main bundles
        run: pnpm --dir apps/moryflow/pc build
      - name: Build macOS arm64 installers
        run: pnpm --dir apps/moryflow/pc exec node ./scripts/run-electron-builder.cjs --mac dmg zip --arm64 --publish never
      - name: Smoke check packaged macOS arm64 app
        run: |
          pnpm --dir apps/moryflow/pc exec tsx scripts/smoke-check-packaged-app.ts \
            --app-dir "release/${{ needs.metadata.outputs.version }}" \
            --require-package "@moryflow/agents-runtime" \
            --require-package "@moryflow/agents-tools" \
            --require-package "@openai/agents" \
            --require-package "@openai/agents-core" \
            --require-package "@openai/agents-extensions" \
            --timeout-ms 12000
      - uses: actions/upload-artifact@v4
        with:
          name: darwin-arm64
          path: apps/moryflow/pc/release/${{ needs.metadata.outputs.version }}/*
          if-no-files-found: error

  build-macos-x64:
    name: Build macOS x64
    needs: metadata
    runs-on: macos-15-intel
    env:
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.metadata.outputs.tag }}
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Prepare Apple notarization key
        shell: bash
        run: |
          KEY_PATH="${RUNNER_TEMP}/AuthKey_${APPLE_API_KEY_ID}.p8"
          if [[ "${APPLE_API_KEY_CONTENT}" == *"BEGIN PRIVATE KEY"* ]]; then
            printf '%s\n' "${APPLE_API_KEY_CONTENT}" > "${KEY_PATH}"
          else
            APPLE_API_KEY_CONTENT="${APPLE_API_KEY_CONTENT}" python3 -c 'import base64, os, sys; sys.stdout.buffer.write(base64.b64decode(os.environ["APPLE_API_KEY_CONTENT"]))' > "${KEY_PATH}"
          fi
          chmod 600 "${KEY_PATH}"
          echo "APPLE_API_KEY=${KEY_PATH}" >> "${GITHUB_ENV}"
      - run: pnpm install --frozen-lockfile --prefer-offline --config.node-linker=isolated
      - name: Build renderer/main bundles
        run: pnpm --dir apps/moryflow/pc build
      - name: Build macOS x64 installers
        run: pnpm --dir apps/moryflow/pc exec node ./scripts/run-electron-builder.cjs --mac dmg zip --x64 --publish never
      - name: Smoke check packaged macOS x64 app
        run: |
          pnpm --dir apps/moryflow/pc exec tsx scripts/smoke-check-packaged-app.ts \
            --app-dir "release/${{ needs.metadata.outputs.version }}" \
            --require-package "@moryflow/agents-runtime" \
            --require-package "@moryflow/agents-tools" \
            --require-package "@openai/agents" \
            --require-package "@openai/agents-core" \
            --require-package "@openai/agents-extensions" \
            --timeout-ms 12000
      - uses: actions/upload-artifact@v4
        with:
          name: darwin-x64
          path: apps/moryflow/pc/release/${{ needs.metadata.outputs.version }}/*
          if-no-files-found: error

  publish:
    name: Publish Release
    needs:
      - metadata
      - build-macos-arm64
      - build-macos-x64
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.metadata.outputs.tag }}
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: pnpm install --frozen-lockfile --prefer-offline
      - uses: actions/download-artifact@v4
        with:
          path: .artifacts
      - name: Generate release notes
        id: release_notes
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          node scripts/generate-release-notes.mjs \
            --repo "${GITHUB_REPOSITORY}" \
            --tag "${{ needs.metadata.outputs.tag }}" \
            --target "${{ needs.metadata.outputs.tag_sha }}" \
            --output .release-notes.md \
            --title-output .release-title.txt

          {
            echo 'release_name<<EOF'
            cat .release-title.txt
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Merge update yml and collect release assets
        shell: bash
        run: |
          set -euo pipefail
          pnpm --dir apps/moryflow/pc exec tsx scripts/merge-update-yml.ts \
            --arm64-dir "../../../.artifacts/darwin-arm64" \
            --x64-dir "../../../.artifacts/darwin-x64" \
            --feed-file "latest-mac.yml" \
            --output-dir "../../../.release-assets"

          for arch in darwin-arm64 darwin-x64; do
            cp .artifacts/${arch}/*.dmg .release-assets/
            cp .artifacts/${arch}/*.zip .release-assets/
            cp .artifacts/${arch}/*.blockmap .release-assets/
          done

          echo "Release assets:"
          ls -lh .release-assets/

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: .release-notes.md
          name: ${{ steps.release_notes.outputs.release_name }}
          tag_name: ${{ needs.metadata.outputs.tag }}
          target_commitish: ${{ needs.metadata.outputs.tag_sha }}
          files: .release-assets/*
