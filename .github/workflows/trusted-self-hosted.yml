name: Trusted Self-Hosted CI

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  NODE_VERSION: 20
  PNPM_VERSION: 9.12.2

jobs:
  trusted-ci:
    name: Trusted CI
    runs-on: [self-hosted, lin-mini]
    steps:
      - name: Runner info
        run: |
          echo "RUNNER_NAME=$RUNNER_NAME"
          echo "RUNNER_OS=$RUNNER_OS"
          echo "RUNNER_ARCH=$RUNNER_ARCH"
          uname -a

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm turbo run typecheck

      - name: Run tests
        run: pnpm turbo run test:unit --concurrency=4

      - name: Verify Anyhunt server production deploy
        run: |
          rm -rf /tmp/ci-anyhunt-server-deploy
          pnpm --filter @anyhunt/anyhunt-server deploy --prod /tmp/ci-anyhunt-server-deploy

      - name: Verify Moryflow server production deploy
        run: |
          rm -rf /tmp/ci-moryflow-server-deploy
          pnpm --filter @moryflow/server deploy --prod /tmp/ci-moryflow-server-deploy

      - name: Build
        env:
          TURBO_CONCURRENCY: 2
          NODE_OPTIONS: --max-old-space-size=4096
        run: pnpm build
